# Deploys the new 2×2 lab backend on the VPS, REPLACING the old judge-only service.
#   cd <repo> && docker compose -f deploy/docker-compose.yml up -d --build
# Your existing Caddy terminates HTTPS and proxies to this container on
# 127.0.0.1:8787 (see deploy/Caddyfile.example). The app does its own auth
# (LAB_API_KEY / x-lab-key) + rate-limiting, so Caddy just forwards.
services:
  lab-backend:
    build:
      context: ..            # repo root — Dockerfile copies lab/{judge,autocorrect,server}
      dockerfile: Dockerfile
    image: ac2-lab-backend:latest
    container_name: ac2-lab-backend
    restart: unless-stopped
    env_file:
      - .env                 # deploy/.env — copy from .env.example; NEVER commit
    ports:
      - "127.0.0.1:8787:8787"   # localhost-only; Caddy fronts it with HTTPS
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
